<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Important Topics (AI) | Aapka Notes</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container nav-flex">
    <h1 class="logo">Aapka<span>Notes</span></h1>

    <nav>
      <ul class="nav-links">
        <li><a href="../dashboard.html">Dashboard</a></li>
        <li><a href="../notes/notes.html">Notes</a></li>
        <li><a href="../subjects.html">Subjects</a></li>
        <li><a href="../pyq/pyq.html">PYQs</a></li>
        <li><a href="../../index.html">Home</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- IMPORTANT TOPICS -->
<section class="dashboard">
  <div class="container">

    <h2 class="section-title">AI Important Topics Generator</h2>
    <p style="text-align:center; color:#666; margin-bottom:40px;">
      Enter details and let AI predict high-probability exam topics
    </p>

    <!-- INPUT FORM -->
    <div class="stats-grid">

      <div class="dashboard-card">
        <label>Subject</label>
        <input id="subjectInput" type="text" placeholder="e.g. Data Structures">
      </div>

      <div class="dashboard-card">
        <label>Semester</label>
        <input id="semesterInput" type="text" placeholder="e.g. Semester 3">
      </div>

    </div>

    <!-- BUTTON -->
    <div style="text-align:center; margin-top:30px;">
      <button class="btn" onclick="generateTopics()">
        Generate Important Topics
      </button>
    </div>

    <!-- OUTPUT -->
    <div class="dashboard-grid" id="topicsOutput" style="margin-top:50px;"></div>

  </div>
</section>

<!-- JS FILES -->
<script src="../../js/main.js"></script>
<script src="../../js/gemini.js"></script>
<script src="../../js/important.js"></script>

<!-- TOGGLE SCRIPT -->
<script>
(function () {
  const toggleBtn = document.getElementById("aiToggle");
  const box = document.getElementById("aiBox");

  if (!toggleBtn || !box) return;

  box.style.display = "none";

  toggleBtn.addEventListener("click", () => {
    if (box.style.display === "none") {
      box.style.display = "flex";
    } else {
      box.style.display = "none";
    }
  });
})();
</script>

</body>
</html>
